<rect x="28" y="128" width="310" height="78" rx="18" fill="#f0e9e4"/><text x="48" y="158" font-family="Arial" font-size="14" fill="#342d29">Make the hero feel more romantic,</text><text x="48" y="180" font-family="Arial" font-size="14" fill="#342d29">using colors from my book cover.</text>
<rect x="82" y="230" width="280" height="92" rx="18" fill="#8f3155"/><text x="104" y="262" font-family="Arial" font-size="14" fill="#fff">I softened the palette, changed the</text><text x="104" y="284" font-family="Arial" font-size="14" fill="#fff">headline type, and added a subtle</text><text x="104" y="306" font-family="Arial" font-size="14" fill="#fff">floral detail behind the cover.</text>
