<rect x="28" y="128" width="318" height="96" rx="18" fill="#252b33"/><text x="48" y="158" font-family="Arial" font-size="14" fill="#eef1f3">Add a reviews section below the book,</text><text x="48" y="180" font-family="Arial" font-size="14" fill="#eef1f3">then make the mobile menu easier to</text><text x="48" y="202" font-family="Arial" font-size="14" fill="#eef1f3">read against the dark background.</text>
